      MAX_COOKIE_REUSE: "${MAX_COOKIE_REUSE:-10}"
      REQUESTS_PER_SESSION: "${REQUESTS_PER_SESSION:-1}"
      REQUEST_DELAY_MIN: "${REQUEST_DELAY_MIN:-20.0}"
      REQUEST_DELAY_MAX: "${REQUEST_DELAY_MAX:-30.0}"
      REDIS_HOST: "${REDIS_HOST:-redis}"
