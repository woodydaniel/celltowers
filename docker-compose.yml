  # Public status API (for Vercel to poll). Reads ./data + ./logs just like workers.
  # Security: enable bearer token via DASHBOARD_BEARER_TOKEN (recommended).
  dashboard_api:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8088:8088"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8088
      - DASHBOARD_ACTIVE_WINDOW_SEC=${DASHBOARD_ACTIVE_WINDOW_SEC:-21600}
      - DASHBOARD_BEARER_TOKEN=${DASHBOARD_BEARER_TOKEN:-}
      - DASHBOARD_DATA_DIR=/app/data
      - DASHBOARD_LOGS_DIR=/app/logs
    command: ["python", "dashboard/server.py"]

  # HTTPS reverse proxy for status-api.shefa7.com → dashboard_api:8088
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - dashboard_api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  redis_data:
  caddy_data:
  caddy_config:
